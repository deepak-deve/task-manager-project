<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <!-- Connect CSS File -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Register Card -->
        <div class="auth-card">

            <h1>Task Manager</h1>

            <h3>Create Account</h3>

            <form action="/register" method="POST">

                <label>Full Name</label>
            
                <input
                    type="text"
                    name="name"
                    placeholder="Enter your name"
                    required
                >
            
                <label>Email</label>
            
                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            
                <label>Password</label>
            
                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
                >
            
                <button type="submit">
            
                    Register
            
                </button>
            
            </form>

            <p>

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </p>

        </div>

    </div>

</body>

</html>
